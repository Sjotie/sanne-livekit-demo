<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sanne LiveKit Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">LiveKit media layer</p>
        <h1>Sanne Voice Room</h1>
        <p id="status">Niet verbonden</p>
        <div class="controls">
          <input id="roomName" aria-label="Room name" placeholder="Nieuwe demo-room" />
          <button id="connectButton" type="button">Connect</button>
          <button id="micButton" type="button" disabled>Mic aan</button>
        </div>
      </section>

      <section class="events">
        <div class="events-title">Room events</div>
        <ol id="events"></ol>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
